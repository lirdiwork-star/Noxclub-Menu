<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0712;
    --panel:#140f22;
    --hairline:#2e2648;
    --lilac:#c9a6ff;
    --lilac-soft:#a98adf;
    --violet:#8a5cf6;
    --violet-deep:#5b3ccf;
    --ivory:#f3eefc;
    --muted:#8f84ac;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--ivory);
    font-family:'Jost',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--violet); color:#fff;}

  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(600px 400px at 20% -5%, rgba(138,92,246,0.28), transparent 60%),
      radial-gradient(500px 400px at 100% 10%, rgba(201,166,255,0.14), transparent 55%),
      radial-gradient(700px 500px at 50% 100%, rgba(90,50,200,0.16), transparent 60%);
    pointer-events:none;
    z-index:0;
  }
  body::after{
    content:"";
    position:fixed; inset:0;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
    z-index:0;
  }

  header.hero{
    position:relative;
    padding:56px 24px 30px;
    text-align:center;
    z-index:1;
  }
  .logo-glow{
    position:relative;
    width:min(280px, 62vw);
    margin:0 auto 8px;
  }
  .logo-glow::before{
    content:"";
    position:absolute;
    inset:-30px;
    background:radial-gradient(circle, rgba(138,92,246,0.35), transparent 70%);
    filter:blur(10px);
    z-index:-1;
  }
  .logo-glow img{
    width:100%;
    display:block;
    filter:drop-shadow(0 0 22px rgba(138,92,246,0.45));
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.36em;
    text-transform:uppercase;
    color:var(--lilac-soft);
    margin:22px 0 6px;
  }
  .rule{
    width:120px; height:2px;
    background:linear-gradient(90deg, transparent, var(--violet), var(--lilac), var(--violet), transparent);
    margin:20px auto;
    box-shadow:0 0 12px rgba(138,92,246,0.7);
    border-radius:2px;
  }
  .sub{
    font-size:12.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:400;
  }

  nav.catnav{
    position:sticky; top:0; z-index:5;
    background:rgba(10,7,18,0.82);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--hairline);
    padding:14px 0;
  }
  .catnav-inner{
    display:flex; gap:8px;
    overflow-x:auto;
    padding:0 18px;
    scrollbar-width:none;
  }
  .catnav-inner::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    font-size:11.5px;
    letter-spacing:0.13em;
    text-transform:uppercase;
    font-weight:500;
    color:var(--muted);
    text-decoration:none;
    padding:8px 15px;
    border:1px solid var(--hairline);
    border-radius:100px;
    white-space:nowrap;
    transition:all .25s ease;
  }
  .chip.active, .chip:hover{
    color:#0a0712;
    background:var(--lilac);
    border-color:var(--lilac);
    box-shadow:0 0 16px rgba(201,166,255,0.55);
  }

  main{
    position:relative; z-index:1;
    max-width:640px;
    margin:0 auto;
    padding:20px 24px 40px;
  }

  section.category{
    padding:46px 0 8px;
    border-bottom:1px solid var(--hairline);
    scroll-margin-top:64px;
  }
  section.category:last-of-type{ border-bottom:none; }

  .cat-head{
    display:flex;
    align-items:baseline;
    gap:14px;
    margin-bottom:22px;
  }
  .cat-num{
    font-size:11px;
    color:var(--violet-deep);
    letter-spacing:0.1em;
    font-weight:600;
  }
  h2.cat-title{
    font-family:'Jost', sans-serif;
    font-weight:700;
    font-size:24px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--lilac);
    margin:0;
    text-shadow:0 0 14px rgba(201,166,255,0.35);
  }

  ul.items{
    list-style:none;
    margin:0; padding:0;
  }
  ul.items li{
    display:flex;
    align-items:baseline;
    gap:8px;
    padding:12px 0;
    border-bottom:1px dotted rgba(143,132,172,0.25);
  }
  ul.items li:last-child{ border-bottom:none; }
  .item-name{
    font-size:16.5px;
    font-weight:500;
    color:var(--ivory);
    white-space:nowrap;
  }
  .leader{
    flex:1;
    border-bottom:1px dotted rgba(143,132,172,0.2);
    transform:translateY(-4px);
  }
  .item-price{
    font-size:14px;
    letter-spacing:0.03em;
    color:var(--lilac);
    font-weight:600;
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }
  .item-price.zero{ color: var(--muted); }

  .seal{
    display:flex; align-items:center; justify-content:center;
    gap:14px;
    margin:52px 0;
  }
  .seal .line{ flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--hairline)); }
  .seal .line.r{ background:linear-gradient(90deg, var(--hairline), transparent); }
  .seal .dot{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--violet);
    box-shadow:0 0 10px 2px rgba(138,92,246,0.8);
  }

  footer{
    text-align:center;
    padding:34px 24px 60px;
    color:var(--muted);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
  }

  @media (max-width:420px){
    .item-name{ font-size:15.5px; }
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .chip{ transition:none; }
  }
</style>
</head>

const fmt = n => n === 0 ? "—" : n.toLocaleString("de-DE") + " L";

const sealHTML = `<div class="seal"><span class="line"></span><span class="dot"></span><span class="line r"></span></div>`;

const main = document.getElementById("main");
const nav = document.getElementById("catnav");

MENU.forEach((cat, i) => {
  const a = document.createElement("a");
  a.href = "#" + cat.id;
  a.className = "chip";
  a.textContent = cat.title;
  a.dataset.target = cat.id;
  nav.appendChild(a);

  const section = document.createElement("section");
  section.className = "category";
  section.id = cat.id;

  const num = String(i+1).padStart(2,"0");
  const itemsHTML = cat.items.map(([name, price]) => `
    <li>
      <span class="item-name">${name}</span>
      <span class="leader"></span>
      <span class="item-price${price===0?' zero':''}">${fmt(price)}</span>
    </li>`).join("");

  section.innerHTML = `
    <div class="cat-head">
      <span class="cat-num">${num}</span>
      <h2 class="cat-title">${cat.title}</h2>
    </div>
    <ul class="items">${itemsHTML}</ul>
  `;
  main.appendChild(section);

  if (i < MENU.length - 1) {
    const sealWrap = document.createElement("div");
    sealWrap.innerHTML = sealHTML;
    main.appendChild(sealWrap.firstElementChild);
  }
});

const chips = Array.from(nav.querySelectorAll(".chip"));
const sections = Array.from(document.querySelectorAll("section.category"));
const io = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      chips.forEach(c => c.classList.remove("active"));
      const active = chips.find(c => c.dataset.target === entry.target.id);
      if (active) {
        active.classList.add("active");
        active.scrollIntoView({inline:"center", block:"nearest", behavior:"smooth"});
      }
    }
  });
}, { rootMargin: "-40% 0px -50% 0px", threshold: 0 });
sections.forEach(s => io.observe(s));
</script>
